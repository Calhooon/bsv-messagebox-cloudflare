name = "rust-message-box"
main = "build/worker/shim.mjs"
compatibility_date = "2026-04-07"
account_id = "your-cloudflare-account-id"

# TODO: Set custom domain after initial deploy
# routes = [
#   { pattern = "message-box.calhouninfra.com", custom_domain = true }
# ]

[vars]
BSV_NETWORK = "mainnet"
WALLET_STORAGE_URL = "https://wallet-infra.x402agency.com"
# Flip to "true" after setting the FIREBASE_SERVICE_ACCOUNT_JSON secret.
ENABLE_FIREBASE = "false"

# Secrets (set via `wrangler secret put`):
#   SERVER_PRIVATE_KEY            — 64-char hex BRC-31 server identity key.
#   FIREBASE_SERVICE_ACCOUNT_JSON — Full Google service-account JSON (for FCM).
#                                   Only required when ENABLE_FIREBASE = "true".
#   R2_ACCESS_KEY_ID              — R2 S3 access key for presigning BEEF uploads.
#   R2_SECRET_ACCESS_KEY          — R2 S3 secret.
#   R2_ACCOUNT_ID                 — Cloudflare account ID (for the R2 S3 host).
# And the plain [vars] R2_BUCKET_NAME should match the [[r2_buckets]].bucket_name.

R2_BUCKET_NAME = "bsv-messagebox-beefs"

[build]
command = "worker-build --release"

[[d1_databases]]
binding = "DB"
database_name = "rust-message-box-prod"
database_id = "your-d1-database-id"

[[kv_namespaces]]
binding = "AUTH_SESSIONS"
id = "your-kv-namespace-id"

# R2 bucket used by /beef/upload-url + sendMessage to handle BEEFs larger
# than the 100 MB Workers body cap. Clients upload via presigned URL (S3 v4
# signed in-WASM via r2_presign.rs), server fetches by key via this binding.
[[r2_buckets]]
binding = "BEEF_BLOBS"
bucket_name = "bsv-messagebox-beefs"

# MessageHub — per-identity hibernatable WebSocket DO (M9). Routing via
# idFromName(identity_key); WS lifecycle and event surface land in
# downstream M9 issues. Deliberately a new class name (not MessageRoom)
# to avoid collision with the v2 deletion.
[[durable_objects.bindings]]
name = "MESSAGE_HUB"
class_name = "MessageHub"

# EngineIoSession — per-sid Engine.IO + Socket.IO transport state (M10
# Phase A — issue #61). Routing via idFromName(sid). Holds polling
# buffer + transport state (polling vs websocket) + pending packets.
# Phase A is auth-less; Phase B layers BRC-103 over the authMessage
# Socket.IO event.
[[durable_objects.bindings]]
name = "ENGINEIO_SESSION"
class_name = "EngineIoSession"

# Durable Object migrations — required so Cloudflare knows what classes
# exist across versions. v1 created MessageRoom (WebSocket rooms); v2
# removed it when we dropped WebSocket to match go-messagebox-server
# scope; v3 introduces MessageHub for the M9 hibernatable-WS rebuild.
[[migrations]]
tag = "v1"
new_classes = ["MessageRoom"]

[[migrations]]
tag = "v2"
deleted_classes = ["MessageRoom"]

[[migrations]]
tag = "v3"
new_classes = ["MessageHub"]

[[migrations]]
tag = "v4"
new_classes = ["EngineIoSession"]

